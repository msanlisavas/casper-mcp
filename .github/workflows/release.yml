name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    name: Publish self-contained (${{ matrix.rid }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        rid: [ win-x64, osx-arm64, linux-x64 ]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish self-contained (${{ matrix.rid }})
      run: >
        dotnet publish src/CasperMcp -c Release -r ${{ matrix.rid }}
        --self-contained true
        -p:PublishSingleFile=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -o publish/${{ matrix.rid }}

    - name: Stage RID-tagged binary (${{ matrix.rid }})
      run: |
        mkdir -p dist
        if [ "${{ matrix.rid }}" = "win-x64" ]; then
          cp "publish/${{ matrix.rid }}/CasperMcp.exe" "dist/CasperMcp-${{ matrix.rid }}.exe"
        else
          cp "publish/${{ matrix.rid }}/CasperMcp" "dist/CasperMcp-${{ matrix.rid }}"
        fi

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: dist/CasperMcp-${{ matrix.rid }}*
